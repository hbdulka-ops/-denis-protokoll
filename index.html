<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denis Protokoll - Sicherheitsdienst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تخصيص مظهر القوائم المنسدلة المخصصة */
        .dropdown-menu { display: none; }
        .dropdown-menu.show { display: block; }
    </style>
</head>
<body class="bg-stone-100 font-sans min-h-screen p-2 sm:p-4">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden p-4 space-y-4">
        
        <div class="text-center py-1">
            <h1 class="text-xl font-black tracking-wider text-slate-700 uppercase">Denis Protokoll</h1>
            <p class="text-xs font-bold tracking-widest text-slate-400 uppercase">Sicherheitsdienst</p>
        </div>

        <div class="grid grid-cols-4 gap-2">
            <button class="bg-white border border-stone-200 rounded-xl p-3 text-slate-600 hover:bg-stone-50"><i class="fa-solid fa-gear"></i></button>
            <button class="bg-white border border-stone-200 rounded-xl p-3 text-slate-600 hover:bg-stone-50"><i class="fa-solid fa-pen-nib"></i></button>
            <button class="bg-white border border-stone-200 rounded-xl p-3 text-slate-600 hover:bg-stone-50"><i class="fa-solid fa-moon"></i></button>
            <button class="bg-white border border-stone-200 rounded-xl p-3 text-slate-600 hover:bg-stone-50"><i class="fa-solid fa-bell"></i></button>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button class="bg-emerald-500 text-white rounded-xl py-3 font-bold text-sm flex items-center justify-center gap-2 shadow-sm"><i class="fa-brands fa-whatsapp text-lg"></i> WhatsApp</button>
            <button class="bg-blue-600 text-white rounded-xl py-3 font-bold text-sm flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-file-pdf"></i> PDF</button>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="resetForm()" class="bg-white border border-stone-200 text-slate-600 rounded-xl py-2 text-sm font-semibold"><i class="fa-solid fa-rotate-left mr-1"></i> Reset</button>
            <button class="bg-rose-500 text-white rounded-xl py-2 text-sm font-bold shadow-sm"><i class="fa-solid fa-print mr-1"></i> Drucken</button>
        </div>

        <div class="bg-slate-700 text-white rounded-2xl p-4 space-y-3">
            <div class="bg-slate-600/50 rounded-lg py-1 px-3 w-fit text-xs font-medium flex items-center gap-2 text-slate-300">
                <i class="fa-solid fa-calendar-days text-rose-400"></i> Nachtschicht von gestern (24.05.2026)
            </div>
            
            <div class="space-y-1">
                <div class="flex justify-between text-xs font-mono text-slate-300">
                    <span>20:00 &rarr; 07:00</span>
                    <span class="font-bold text-white">80%</span>
                </div>
                <div class="w-full bg-slate-600 h-2 rounded-full overflow-hidden">
                    <div class="bg-rose-400 h-full rounded-full" style="width: 80%"></div>
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <div class="bg-slate-600/40 border border-slate-500/30 rounded-xl px-3 py-2 text-xs sm:text-sm flex-1 text-center font-medium">Sonntag</div>
                <div class="bg-slate-600/40 border border-slate-500/30 rounded-xl px-3 py-2 text-xs sm:text-sm flex-1 text-center font-mono">24.05.2026</div>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-1 text-center text-[11px] font-bold text-slate-500 pt-2">
            <div class="bg-stone-100 py-1 rounded">Kunde</div>
            <div class="bg-emerald-50 py-1 rounded text-emerald-700">Beginn</div>
            <div class="bg-amber-50 py-1 rounded text-amber-700">Ende</div>
            <div class="bg-rose-50 py-1 rounded text-rose-700">Dienstnotiz</div>
        </div>

        <div id="rows-container" class="space-y-3">
            </div>

        <div class="grid grid-cols-3 gap-2 pt-2 items-center">
            <button onclick="removeRow()" class="bg-white border border-stone-200 text-slate-600 rounded-xl py-2 text-sm font-bold hover:bg-stone-50">- Zeile</button>
            <div id="row-counter" class="text-center text-xs font-bold text-slate-400 font-mono">0 Zeilen</div>
            <button onclick="addRow()" class="bg-rose-500 text-white rounded-xl py-2 text-sm font-bold shadow-sm hover:bg-rose-600">+ Zeile</button>
        </div>

        <div class="border-t border-stone-100 pt-3 grid grid-cols-2 gap-2 text-[11px] font-bold text-slate-500">
            <div class="bg-stone-50 rounded-full px-3 py-1.5 flex items-center justify-between border border-stone-200/60">
                <span>🔴 <span id="status-kunden">0</span> Kunden</span>
                <span>🔴 <span id="status-vorfaelle">0</span> Vorfälle</span>
            </div>
            <div class="bg-stone-50 rounded-full px-3 py-1.5 flex items-center justify-between border border-stone-200/60 font-mono">
                <span class="text-blue-500"><i class="fa-solid fa-floppy-disk"></i> <span id="save-time">04:49:55</span></span>
            </div>
        </div>

    </div>

    <script>
        let rowCount = 0;
        const ereignisse = [
            "Obdachlose nach draußen gebracht",
            "Fahrzeuge herausgelassen",
            "Unbefugte Person entfernt",
            "Fahrzeugschaden festgestellt",
            "Parkverstoß dokumentiert",
            "Sachschaden festgestellt - Dokumentiert"
        ];

        function updateStatus() {
            document.getElementById('row-counter').innerText = `${rowCount} Zeilen`;
            document.getElementById('status-kunden').innerText = rowCount;
            // حساب افتراضي للأحداث المفعلة
            const activeVorfälle = document.querySelectorAll('.ereignis-select').length;
            document.getElementById('status-vorfaelle').innerText = rowCount > 0 ? 1 : 0;
        }

        function setNow(buttonId) {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0].substring(0, 5);
            const button = document.getElementById(buttonId);
            button.innerText = timeString;
            button.classList.remove('bg-stone-50', 'text-slate-400');
            button.classList.add('bg-slate-700', 'text-white', 'font-mono');
        }

        function toggleDropdown(id) {
            document.getElementById(id).classList.toggle('show');
        }

        function selectEreignis(rowIndex, text) {
            const btn = document.getElementById(`ereignis-btn-${rowIndex}`);
            btn.innerText = text;
            btn.classList.remove('text-rose-400');
            btn.classList.add('text-slate-700', 'font-medium');
            toggleDropdown(`dropdown-${rowIndex}`);
        }

        function addRow() {
            rowCount++;
            const container = document.getElementById('rows-container');
            
            const rowHtml = `
                <div id="row-${rowCount}" class="grid grid-cols-4 gap-1 items-start bg-white p-1 rounded-xl relative border border-transparent hover:border-stone-100">
                    <div class="border border-stone-200 rounded-xl p-2 text-center text-xs font-bold text-slate-700 bg-white shadow-sm min-h-[50px] flex flex-col justify-center">
                        <span class="text-[10px] text-stone-400 block font-mono">#0${rowCount}</span>
                        <input type="text" placeholder="— Standort —" class="w-full text-center bg-transparent focus:outline-none text-xs">
                    </div>
                    
                    <div class="flex flex-col justify-between min-h-[50px]">
                        <button id="start-btn-${rowCount}" onclick="setNow('start-btn-${rowCount}')" class="border border-stone-200 rounded-xl py-3 text-center text-[11px] font-medium text-slate-400 bg-stone-50 hover:bg-stone-100 flex flex-col items-center justify-center gap-1">
                            <i class="fa-solid fa-stopwatch text-[10px]"></i> Jetzt
                        </button>
                    </div>

                    <div class="flex flex-col justify-between min-h-[50px]">
                        <button id="end-btn-${rowCount}" onclick="setNow('end-btn-${rowCount}')" class="border border-stone-200 rounded-xl py-3 text-center text-[11px] font-medium text-slate-400 bg-stone-50 hover:bg-stone-100 flex flex-col items-center justify-center gap-1">
                            <i class="fa-solid fa-stopwatch text-[10px]"></i> Jetzt
                        </button>
                    </div>

                    <div class="relative min-h-[50px] flex flex-col justify-center">
                        <button id="ereignis-btn-${rowCount}" onclick="toggleDropdown('dropdown-${rowCount}')" class="border border-stone-200 rounded-xl p-2 text-center text-[10px] font-bold text-rose-400 bg-rose-50/30 hover:bg-rose-50 min-h-[46px] flex items-center justify-center break-words overflow-hidden">
                            + Ereignis
                        </button>
                        
                        <div id="dropdown-${rowCount}" class="dropdown-menu absolute right-0 top-full mt-1 w-48 bg-white border border-stone-200 rounded-xl shadow-xl z-50 p-1 text-left hidden">
                            <div class="text-[10px] uppercase font-bold tracking-wider text-emerald-600 px-2 py-1 border-b border-stone-100">&mdash; Regulär &mdash;</div>
                            ${ereignisse.map(e => `
                                <button onclick="selectEreignis(${rowCount}, '${e}')" class="w-full text-left px-2 py-1.5 text-[11px] text-slate-700 hover:bg-stone-50 rounded-lg truncate block">
                                    ${e}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', rowHtml);
            updateStatus();
        }

        function removeRow() {
            if (rowCount > 0) {
                const lastRow = document.getElementById(`row-${rowCount}`);
                if (lastRow) lastRow.remove();
                rowCount--;
                updateStatus();
            }
        }

        function resetForm() {
            document.getElementById('rows-container').innerHTML = '';
            rowCount = 0;
            updateStatus();
        }

        // إضافة سطر أول تلقائياً عند الفتح
        window.onload = function() {
            addRow();
        };
    </script>
</body>
</html>
