<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardX Pro - Intelligent Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .dropdown-menu { display: none; }
        .dropdown-menu.show { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-2 sm:p-4">

    <div class="max-w-md mx-auto bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 overflow-hidden p-4 space-y-4">
        
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
            <div>
                <h1 class="text-lg font-black tracking-wider text-rose-500 uppercase flex items-center gap-1">
                    <i class="fa-solid fa-shield-halved animate-pulse"></i> GuardX Pro
                </h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Next-Gen Sicherheitsdienst</p>
            </div>
            <div class="bg-slate-800/80 border border-slate-700 rounded-xl px-3 py-1.5 text-center">
                <span class="text-[9px] block text-slate-400 font-bold uppercase tracking-wider">Nächster Rundgang</span>
                <span id="countdown-timer" class="text-sm font-mono font-bold text-amber-400">45:00</span>
            </div>
        </div>

        <div class="no-print grid grid-cols-3 gap-2">
            <button onclick="startQRScannerAll()" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl py-2.5 font-bold text-xs flex items-center justify-center gap-1.5 shadow-lg">
                <i class="fa-solid fa-qrcode text-sm"></i> QR Scannen
            </button>
            <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-xl py-2.5 font-bold text-xs flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-print"></i> Drucken
            </button>
            <button onclick="resetProtokoll()" class="bg-rose-600/20 hover:bg-rose-600/30 text-rose-400 border border-rose-500/30 rounded-xl py-2.5 font-bold text-xs flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-trash-can"></i> Reset
            </button>
        </div>

        <div id="qr-reader-container" class="hidden bg-slate-800 p-2 rounded-2xl border border-slate-700 space-y-2">
            <div id="qr-reader" class="w-full overflow-hidden rounded-xl"></div>
            <button onclick="stopQRScanner()" class="w-full bg-rose-500 text-white text-xs font-bold py-1.5 rounded-lg">Scanner schließen</button>
        </div>

        <div class="bg-gradient-to-br from-slate-800 to-slate-800/50 border border-slate-700/60 rounded-2xl p-3.5 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div class="space-y-0.5">
                    <label class="text-[9px] uppercase tracking-wider font-bold text-slate-400">Dienstantritt</label>
                    <input type="text" id="shift-start" value="18:00" class="bg-slate-900/60 border border-slate-700 rounded-lg px-2 py-1 text-xs w-full font-mono text-center focus:outline-none focus:border-indigo-500">
                </div>
                <div class="space-y-0.5">
                    <label class="text-[9px] uppercase tracking-wider font-bold text-slate-400">Dienstende</label>
                    <input type="text" id="shift-end" value="06:00" class="bg-slate-900/60 border border-slate-700 rounded-lg px-2 py-1 text-xs w-full font-mono text-center focus:outline-none focus:border-indigo-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="shift-day" placeholder="Tag" class="bg-slate-900/40 border border-slate-700/50 rounded-lg py-1.5 text-xs text-center font-medium focus:outline-none">
                <input type="text" id="shift-date" placeholder="Datum" class="bg-slate-900/40 border border-slate-700/50 rounded-lg py-1.5 text-xs font-mono text-center focus:outline-none">
            </div>
        </div>

        <div id="guardx-rows" class="space-y-3">
            </div>

        <button onclick="addNewGuardRow()" class="no-print w-full bg-slate-800 border border-slate-700 text-slate-300 hover:text-white hover:bg-slate-750 py-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 transition-all">
            <i class="fa-solid fa-plus text-rose-500"></i> Manueller Eintrag (+ Zeile)
        </button>

        <div class="border-t border-slate-800 pt-3 flex justify-between items-center text-[10px] font-bold text-slate-400">
            <div class="flex gap-2">
                <span class="bg-slate-800 px-2 py-1 rounded-md border border-slate-700"><span id="count-scans" class="text-indigo-400 font-mono">0</span> QR-Scans</span>
                <span class="bg-slate-800 px-2 py-1 rounded-md border border-slate-700"><span id="count-events" class="text-rose-400 font-mono">0</span> Vorfälle</span>
            </div>
            <span class="font-mono text-slate-500"><i class="fa-solid fa-cloud-arrow-up text-emerald-500 mr-0.5"></i> Auto-Save</span>
        </div>

    </div>

    <script>
        let rowCount = 0;
        let html5QrCode = null;
        let countdownSeconds = 45 * 60;

        const standardEreignisse = [
            "Kontrollgang ohne Vorkommnisse durchgeführt",
            "Zustandskontrolle: Alles in Ordnung",
            "Obdachlose Person vom Gelände verwiesen",
            "Unbefugtes Fahrzeug dokumentiert",
            "Sicherheitsrisiko festgestellt & behoben"
        ];

        // 1. نظام المؤقت التنازلي التلقائي للجولات
        function startCountdown() {
            setInterval(() => {
                if(countdownSeconds <= 0) {
                    countdownSeconds = 45 * 60; // إعادة التعيين لـ 45 دقيقة تلقائياً
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]); // اهتزاز الهاتف للتنبيه
                }
                countdownSeconds--;
                let mins = Math.floor(countdownSeconds / 60);
                let secs = countdownSeconds % 60;
                document.getElementById('countdown-timer').innerText = 
                    `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        function setAutomaticDate() {
            const days = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
            const now = new Date();
            document.getElementById('shift-day').value = days[now.getDay()];
            document.getElementById('shift-date').value = `${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth()+1).padStart(2, '0')}.${now.getFullYear()}`;
        }

        // 2. ميزة تشغيل ماسح الـ QR Code الفعلي عبر الكاميرا الخلفية
        function startQRScannerAll() {
            const container = document.getElementById('qr-reader-container');
            container.classList.remove('hidden');
            
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (qrText) => {
                    // عند نجاح المسح: إنشاء سطر فوري وتعبئة اسم الموقع المكتوب داخل الـ QR
                    addNewGuardRow(qrText);
                    let scanNum = parseInt(document.getElementById('count-scans').innerText);
                    document.getElementById('count-scans').innerText = scanNum + 1;
                    stopQRScanner();
                },
                (errorMessage) => { /* جاري البحث */ }
            ).catch(err => alert("Kamera-Fehler: " + err));
        }

        function stopQRScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qr-reader-container').classList.add('hidden');
                });
            }
        }

        // 3. تحويل الصوت إلى كود مكتوب (Speech Recognition API باللغة الألمانية)
        function startVoiceInput(id) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("ميزه الصوت غير مدعومة في متصفحك الحالي.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            
            const micBtn = document.getElementById(`mic-btn-${id}`);
            micBtn.classList.remove('text-slate-400');
            micBtn.classList.add('text-rose-500', 'animate-bounce');

            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                document.getElementById(`note-input-${id}`).value = text;
                saveGuardData();
            };

            recognition.onend = function() {
                micBtn.classList.remove('text-rose-500', 'animate-bounce');
                micBtn.classList.add('text-slate-400');
            };

            recognition.start();
        }

        function toggleDrop(id) {
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                if(m.id !== id) m.classList.remove('show');
            });
            document.getElementById(id).classList.toggle('show');
        }

        function selectEventPro(id, val) {
            const textInput = document.getElementById(`note-input-${id}`);
            textInput.value = val;
            
            if(!val.includes("ohne Vorkommnisse") && !val.includes("Ordnung")) {
                let evNum = parseInt(document.getElementById('count-events').innerText);
                document.getElementById('count-events').innerText = evNum + 1;
            }
            toggleDrop(`drop-${id}`);
            saveGuardData();
        }

        // 4. توليد الأسطر المبتكرة والذكية
        function addNewGuardRow(prefilledLocation = "") {
            rowCount++;
            const container = document.getElementById('guardx-rows');
            const now = new Date();
            const currentTime = now.toTimeString().split(' ')[0].substring(0, 5);

            const html = `
                <div id="g-row-${rowCount}" class="bg-slate-800/40 border border-slate-800 rounded-2xl p-2.5 space-y-2 relative">
                    
                    <div class="grid grid-cols-12 gap-1.5 items-center">
                        <div class="col-span-3 text-center bg-slate-800 rounded-xl py-1.5 border border-slate-700/60">
                            <span class="text-[9px] text-rose-500 block font-mono font-bold">#0${rowCount}</span>
                            <span class="text-xs font-mono font-black text-slate-200">${currentTime}</span>
                        </div>

                        <div class="col-span-5 bg-slate-900 border border-slate-700/80 rounded-xl px-2 py-2 flex items-center">
                            <input type="text" id="loc-input-${rowCount}" value="${prefilledLocation}" placeholder="— Standort —" oninput="saveGuardData()" class="w-full text-center bg-transparent focus:outline-none text-xs font-bold text-slate-200">
                        </div>

                        <div class="col-span-4 relative">
                            <button onclick="toggleDrop('drop-${rowCount}')" class="w-full bg-slate-800 border border-slate-700 rounded-xl py-2 text-[10px] font-bold text-rose-400 hover:bg-slate-750 truncate px-1">
                                <i class="fa-solid fa-list-check mr-0.5"></i> Status / Event
                            </button>
                            <div id="drop-${rowCount}" class="dropdown-menu absolute right-0 top-full mt-1 w-52 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-50 p-1 text-left hidden">
                                ${standardEreignisse.map(e => `
                                    <button onclick="selectEventPro(${rowCount}, '${e}')" class="w-full text-left px-2 py-1.5 text-[10px] text-slate-300 hover:bg-slate-700 rounded-lg truncate block border-b border-slate-700/45 last:border-0">${e}</button>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-950/80 border border-slate-800 rounded-xl p-1.5 flex items-center gap-2">
                        <input type="text" id="note-input-${rowCount}" placeholder="Dienstnotiz eintragen oder Mikrofon nutzen..." oninput="saveGuardData()" class="w-full bg-transparent focus:outline-none text-xs text-slate-300 px-1 font-medium">
                        
                        <button id="mic-btn-${rowCount}" onclick="startVoiceInput(${rowCount})" class="text-slate-400 hover:text-white px-2 py-1 bg-slate-800 rounded-lg text-xs transition-all">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>

                    <button onclick="deleteThisRow(${rowCount})" class="no-print absolute -top-1 -right-1 w-4 h-4 bg-rose-950/80 text-rose-400 text-[8px] rounded-full border border-rose-800 flex items-center justify-center font-bold">X</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            saveGuardData();
        }

        function deleteThisRow(id) {
            const row = document.getElementById(`g-row-${id}`);
            if(row) row.remove();
            saveGuardData();
        }

        // الحفظ التلقائي في الذاكرة (Local Storage) لمنع ضياع التقارير
        function saveGuardData() {
            const rowsArr = [];
            for(let i=1; i<=rowCount; i++) {
                const loc = document.getElementById(`loc-input-${i}`);
                if(!loc) continue;
                rowsArr.push({
                    location: loc.value,
                    note: document.getElementById(`note-input-${i}`).value
                });
            }
            const data = {
                day: document.getElementById('shift-day').value,
                date: document.getElementById('shift-date').value,
                rows: rowsArr
            };
            localStorage.setItem('guardx_pro_storage', JSON.stringify(data));
        }

        function loadGuardData() {
            const raw = localStorage.getItem('guardx_pro_storage');
            if(!raw) {
                setAutomaticDate();
                addNewGuardRow();
                return;
            }
            const parsed = JSON.parse(raw);
            document.getElementById('shift-day').value = parsed.day || '';
            document.getElementById('shift-date').value = parsed.date || '';
            if(parsed.rows && parsed.rows.length > 0) {
                parsed.rows.forEach(r => {
                    addNewGuardRow(r.location);
                    document.getElementById(`note-input-${rowCount}`).value = r.note || '';
                });
            } else {
                addNewGuardRow();
            }
            setAutomaticDate();
        }

        function resetProtokoll() {
            if(confirm("Protokoll komplett löschen?")) {
                localStorage.removeItem('guardx_pro_storage');
                document.getElementById('guardx-rows').innerHTML = '';
                rowCount = 0;
                setAutomaticDate();
                addNewGuardRow();
            }
        }

        window.onload = function() {
            loadGuardData();
            startCountdown();
        };
    </script>
</body>
</html>
