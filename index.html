<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denis Protokoll</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --red: #E8394A; 
            --red2: #ff6b7a; 
            --green: #4cba6b;
            --bg: #ECEEF2; 
            --card: #ffffff; 
            --border: #E2E5EC;
            --text: #141518; 
            --muted: #8890A0; 
            --row-hover: #fff8f8;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); 
            min-height: 100vh;
            padding: 24px 16px 60px;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background-image: radial-gradient(circle at 1px 1px, #c8cdd8 1px, transparent 0);
            background-size: 28px 28px; opacity: 0.35;
            pointer-events: none; z-index: 0;
        }
        .toolbar {
            position: relative; z-index: 2;
            max-width: 900px; margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .toolbar-brand { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
        .toolbar-brand span { color: var(--red); }
        .toolbar-right { display: flex; gap: 8px; }
        .btn { padding: 9px 20px; border-radius: 10px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-red { background: var(--red); color: white; box-shadow: 0 4px 12px rgba(232,57,74,0.35); }
        .btn-red:hover { background: #c8102e; transform: translateY(-1px); }
        .btn-ghost { background: white; color: #555; border: 1.5px solid var(--border); }
        .btn-ghost:hover { background: #f8f8f8; }

        .card { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 24px; box-shadow: 0 2px 0 #d0d4dc, 0 8px 40px rgba(0,0,0,0.09); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #4a6080 0%, #3d5268 100%); padding: 22px 28px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .header-left { display: flex; flex-direction: column; gap: 2px; }
        .header-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,200,200,0.85); margin-bottom: 2px; }
        .header-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: white; line-height: 1; letter-spacing: -0.5px; }
        .header-title span { color: #ffb3b9; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .day-select { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: white; background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 6px 12px; cursor: pointer; outline: none; }
        .date-input { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 6px 12px; outline: none; }
        
        .status-badge { display: flex; align-items: center; gap: 7px; background: rgba(76,186,107,0.12); border: 1px solid rgba(76,186,107,0.3); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 700; color: #4cba6b; cursor: pointer; transition: all 0.2s; user-select: none; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4cba6b; }
        .status-badge.incident { background: rgba(232,57,74,0.12); border-color: rgba(232,57,74,0.3); color: var(--red); }
        .status-badge.incident .status-dot { background: var(--red); }

        .col-headers { display: grid; grid-template-columns: 160px 100px 100px 1fr; gap: 0; padding: 14px 20px 6px; border-bottom: 1px solid var(--border); background: #fdfdfd; }
        .col-tag { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 4px; }
        .tag-kunde { color: #555; }
        .tag-beginn { color: #2e7d32; }
        .tag-ende { color: #b78103; }
        .tag-notiz { color: #c62828; }

        .rows-wrap { padding: 10px 0; background: #ffffff; }
        .proto-row { display: grid; grid-template-columns: 160px 100px 100px 1fr; gap: 0; border-bottom: 1px solid #f1f3f7; transition: background 0.15s; align-items: stretch; }
        .proto-row:hover { background: var(--row-hover); }
        .proto-row:last-child { border-bottom: none; }
        
        .cell { padding: 12px 15px; display: flex; align-items: center; border-right: 1px solid #edf0f5; position: relative; }
        .cell:last-child { border-right: none; }
        
        .row-num { font-size: 10px; font-weight: 700; color: #ccd2de; margin-right: 6px; font-family: 'Syne', sans-serif; }
        
        select, input[type="text"] {
            width: 100%; border: none; background: transparent; outline: none;
            font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--text);
        }
        select { cursor: pointer; color: #334155; font-weight: 700; }
        
        .time-box-interactive { font-weight: 700; color: #64748b; font-family: monospace; cursor: pointer; font-size: 13px; text-align: center; width: 100%; user-select: none; }
        .time-box-filled { color: var(--text); font-weight: 800; }

        .notiz-container { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .dropdown-wrapper { position: relative; flex-grow: 1; }
        .dropdown-menu {
            display: none; position: absolute; left: 0; top: 100%; margin-top: 4px; 
            width: 260px; background: white; border: 1px solid #dcdfe6; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 100; padding: 4px;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            width: 100%; text-align: left; padding: 8px 12px; background: none; border: none;
            font-size: 11px; font-weight: 600; color: #475569; cursor: pointer; border-radius: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .dropdown-item:hover { background: #f1f5f9; color: var(--text); }

        .add-zone { padding: 20px; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid var(--border); background: #fcfdfe; }
        .rm-row-btn, .add-row-btn2 { padding: 8px 18px; border-radius: 10px; border: 1.5px solid var(--border); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; background: white; color: #666; transition: all 0.15s; }
        .add-row-btn2 { border-color: var(--red); color: var(--red); }
        .add-row-btn2:hover { background: var(--red); color: white; }
        .rm-row-btn:hover { background: #f8f8f8; }

        .card-footer { background: #f8fafc; padding: 16px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .chips { display: flex; gap: 12px; }
        .chip { display: flex; align-items: center; gap: 6px; background: white; border: 1.5px solid var(--border); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; color: #555; }
        .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: #94a3b8; }
        .footer-brand { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
        .footer-brand span { color: var(--red); }

        .delete-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; opacity: 0; transition: opacity 0.2s, color 0.2s; padding: 4px; }
        .proto-row:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--red); }

        /* ======================================================= */
        /* 🖨️ إعدادات الطباعة الصارمة والذكية لمنع البهتان تماماً */
        /* ======================================================= */
        @media print {
            .no-print, .btn, .add-zone, .delete-btn { display: none !important; }
            body { background: white !important; padding: 0 !important; color: #000000 !important; }
            body::before { display: none !important; }
            
            .card { 
                box-shadow: none !important; 
                border: 1.5px solid #141518 !important; 
                max-w: 100% !important; 
                margin: 0 !important; 
                border-radius: 0 !important; 
            }
            .card-header { 
                background: #3d5268 !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .col-headers {
                background: #f1f3f7 !important;
                border-bottom: 1.5px solid #141518 !important;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
            }
            .proto-row { 
                border-bottom: 1.5px solid #141518 !important; 
                page-break-inside: avoid; 
                background: white !important;
            }
            .cell { 
                border-right: 1.5px solid #141518 !important; 
            }
            .cell:last-child { 
                border-right: none !important; 
            }
            .col-tag, .row-num, select, .time-box-interactive, button {
                color: #000000 !important;
                font-weight: bold !important;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
            }
            select { appearance: none; -webkit-appearance: none; }
        }
    </style>
</head>
<body>

    <div class="toolbar no-print">
        <div class="toolbar-brand">Denis <span>Protokoll</span></div>
        <div class="toolbar-right">
            <button onclick="resetForm()" class="btn btn-ghost"><i class="fa-solid fa-rotate-left"></i> Reset</button>
            <button onclick="window.print()" class="btn btn-red"><i class="fa-solid fa-print"></i> Drucken</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="header-left">
                <div class="header-eyebrow">Sicherheitsdienst · Vorfallprotokoll</div>
                <div class="header-title">Denis <span>Protokoll</span></div>
            </div>
            <div class="header-right">
                <select class="day-select" id="daySelect" onchange="saveAllData()">
                    <option>Montag</option><option>Dienstag</option><option>Mittwoch</option>
                    <option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option>
                </select>
                <input class="date-input" type="date" id="dateInput" onchange="saveAllData()">
                <div class="status-badge" id="statusBadge" onclick="toggleStatus()">
                    <span class="status-dot"></span>
                    <span id="statusText">Regulär</span>
                </div>
            </div>
        </div>

        <div class="col-headers">
            <div class="col-tag tag-kunde">Kunde</div>
            <div class="col-tag tag-beginn">Beginn</div>
            <div class="col-tag tag-ende">Ende</div>
            <div class="col-tag tag-notiz">Dienstnotiz</div>
        </div>

        <div class="rows-wrap" id="rowsWrap">
            </div>

        <div class="add-zone no-print">
            <button class="rm-row-btn" onclick="removeLastRow()">− Zeile</button>
            <span id="rowCount">0 Zeilen</span>
            <button class="add-row-btn2" onclick="addNewRow()">＋ Zeile</button>
        </div>

        <div class="card-footer">
            <div class="chips">
                <div class="chip"><span class="chip-dot" style="background:#4cba6b"></span><span id="chipK">0 Kunden</span></div>
                <div class="chip"><span class="chip-dot" style="background:var(--red)"></span><span id="chipV">0 Vorfälle</span></div>
                <div class="chip"><span class="chip-dot" style="background:#2b61cd"></span><span id="chipR">0 Zeilen</span></div>
            </div>
            <div class="footer-brand">Denis <span>Protokoll</span></div>
        </div>
    </div>

    <script>
        const KUNDEN = ['— Standort —','Galerie','Lüneburg Parkhaus','Fuhle','Parking Millerntorplatz','Parkhaus My Falkenried'];
        const EREIGNISSE = [
            'Obdachlose nach draußen gebracht',
            'Fahrzeuge herausgelassen',
            'Unbefugte Person entfernt',
            'Vandalismus gemeldet',
            'Fahrzeugschaden festgestellt',
            'Parkverstoß dokumentiert',
            'Technischer Defekt gemeldet',
            'Streit geschlichtet'
        ];

        let globalRowId = 0;
        let statusOk = true;

        function toggleStatus() {
            statusOk = !statusOk;
            document.getElementById('statusBadge').className = 'status-badge' + (statusOk ? '' : ' incident');
            document.getElementById('statusText').textContent = statusOk ? 'Regulär' : 'Vorfall active';
            saveAllData();
        }

        function setNowTime(id, field) {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0].substring(0, 5);
            const span = document.getElementById(`${field}-lbl-${id}`);
            span.innerText = timeStr;
            span.className = "time-box-interactive window-time time-box-filled";
            
            if(field === 'start') {
                span.style.color = '#2e7d32';
            } else {
                span.style.color = '#b78103';
            }
            
            updateSummaryCounters();
            saveAllData();
        }

        function toggleDropdown(id) {
            document.querySelectorAll('.dropdown-menu').forEach(m => { if(m.id !== id) m.classList.remove('show'); });
            const menu = document.getElementById(id);
            if(menu) menu.classList.toggle('show');
        }

        function selectEreignis(id, text) {
            const btn = document.getElementById(`notiz-btn-${id}`);
            const input = document.getElementById(`notiz-input-${id}`);
            btn.innerText = text;
            btn.style.color = '#141518';
            input.value = text;
            toggleDropdown(`drop-${id}`);
            updateSummaryCounters();
            saveAllData();
        }

        function addNewRow(savedData = null) {
            globalRowId++;
            const wrap = document.getElementById('rowsWrap');
            
            const row = document.createElement('div');
            row.className = 'proto-row';
            row.id = `row-${globalRowId}`;
            
            const currentKunde = savedData?.kunde || '— Standort —';
            const currentStart = savedData?.start || '--:--';
            const currentEnd = savedData?.end || '--:--';
            const currentNotiz = savedData?.notiz || 'Notiz hinzufügen...';
            
            row.innerHTML = `
                <div class="cell">
                    <span class="row-num">#${String(globalRowId).padStart(2,'0')}</span>
                    <select id="kunde-${globalRowId}" onchange="saveAllData(); updateSummaryCounters();">
                        ${KUNDEN.map(x => `<option ${x === currentKunde ? 'selected' : ''}>${x}</option>`).join('')}
                    </select>
                </div>

                <div class="cell" onclick="setNowTime(${globalRowId}, 'start')">
                    <span id="start-lbl-${globalRowId}" class="time-box-interactive ${currentStart !== '--:--' ? 'time-box-filled' : ''}">${currentStart}</span>
                </div>

                <div class="cell" onclick="setNowTime(${globalRowId}, 'end')">
                    <span id="end-lbl-${globalRowId}" class="time-box-interactive ${currentEnd !== '--:--' ? 'time-box-filled' : ''}">${currentEnd}</span>
                </div>

                <div class="cell">
                    <div class="notiz-container">
                        <div class="dropdown-wrapper">
                            <button id="notiz-btn-${globalRowId}" onclick="event.stopPropagation(); toggleDropdown('drop-${globalRowId}')" style="background:none; border:none; text-align:left; font-size:13px; font-weight:600; color:${currentNotiz.includes('...') ? '#8890A0' : '#141518'}; cursor:pointer; width:100%; outline:none;">
                                ${currentNotiz}
                            </button>
                            <input type="hidden" id="notiz-input-${globalRowId}" value="${currentNotiz.includes('...') ? '' : currentNotiz}">
                            <div id="drop-${globalRowId}" class="dropdown-menu">
                                ${EREIGNISSE.map(e => `<button onclick="event.stopPropagation(); selectEreignis(${globalRowId}, '${e}')" class="dropdown-item">${e}</button>`).join('')}
                            </div>
                        </div>
                        <button onclick="deleteSpecificRow(${globalRowId})" class="delete-btn no-print" title="Zeile löschen">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `;
            
            wrap.appendChild(row);
            updateSummaryCounters();
        }

        function deleteSpecificRow(id) {
            const el = document.getElementById(`row-${id}`);
            if(el) el.remove();
            updateSummaryCounters();
            saveAllData();
        }

        function removeLastRow() {
            const wrap = document.getElementById('rowsWrap');
            if(wrap.lastChild) {
                wrap.lastChild.remove();
                updateSummaryCounters();
                saveAllData();
            }
        }

        function updateSummaryCounters() {
            const rows = document.querySelectorAll('.proto-row');
            document.getElementById('rowCount').innerText = `${rows.length} Zeilen`;
            document.getElementById('chipR').innerText = `${rows.length} Zeilen`;
            
            let activeKunden = 0;
            let activeVorfaelle = 0;

            rows.forEach(r => {
                const id = r.id.split('-')[1];
                const kVal = document.getElementById(`kunde-${id}`).value;
                const nVal = document.getElementById(`notiz-input-${id}`).value;
                
                if(kVal !== '— Standort —') activeKunden++;
                if(nVal && nVal !== '') activeVorfaelle++;
            });

            document.getElementById('chipK').innerText = `${activeKunden} Kunden`;
            document.getElementById('chipV').innerText = `${activeVorfaelle} Vorfälle`;
        }

        function saveAllData() {
            const rowsData = [];
            document.querySelectorAll('.proto-row').forEach(r => {
                const id = r.id.split('-')[1];
                rowsData.push({
                    kunde: document.getElementById(`kunde-${id}`).value,
                    start: document.getElementById(`start-lbl-${id}`).innerText,
                    end: document.getElementById(`end-lbl-${id}`).innerText,
                    notiz: document.getElementById(`notiz-btn-${id}`).innerText
                });
            });

            const state = {
                day: document.getElementById('daySelect').value,
                date: document.getElementById('dateInput').value,
                statusOk: statusOk,
                rows: rowsData
            };
            localStorage.setItem('denis_proto_final_storage', JSON.stringify(state));
        }

        function loadAllData() {
            const raw = localStorage.getItem('denis_proto_final_storage');
            const today = new Date();
            
            document.getElementById('dateInput').value = today.toISOString().split('T')[0];
            const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
            document.getElementById('daySelect').value = DAYS[today.getDay()];

            if(!raw) {
                for(let i=0; i<4; i++) addNewRow();
                return;
            }

            const state = JSON.parse(raw);
            document.getElementById('daySelect').value = state.day || DAYS[today.getDay()];
            document.getElementById('dateInput').value = state.date || today.toISOString().split('T')[0];
            statusOk = state.statusOk !== undefined ? state.statusOk : true;
            
            document.getElementById('statusBadge').className = 'status-badge' + (statusOk ? '' : ' incident');
            document.getElementById('statusText').textContent = statusOk ? 'Regulär' : 'Vorfall active';

            if(state.rows && state.rows.length > 0) {
                state.rows.forEach(r => addNewRow(r));
            } else {
                for(let i=0; i<4; i++) addNewRow();
            }
            updateSummaryCounters();
        }

        function resetForm() {
            if(confirm("Protokoll wirklich zurücksetzen?")) {
                localStorage.removeItem('denis_proto_final_storage');
                document.getElementById('rowsWrap').innerHTML = '';
                globalRowId = 0;
                loadAllData();
            }
        }

        document.addEventListener('click', function() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        });

        window.onload = loadAllData;
    </script>
</body>
</html>
